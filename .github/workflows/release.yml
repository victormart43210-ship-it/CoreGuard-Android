name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and Attest Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.jks"

      - name: Build release AAB
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
        run: |
          ./gradlew bundleRelease \
            --no-daemon --stacktrace

      - name: Compute SHA-256 checksum
        run: |
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          echo "AAB_PATH=$AAB" >> "$GITHUB_ENV"
          sha256sum "$AAB" | tee app/build/outputs/bundle/release/checksums-sha256.txt

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ env.AAB_PATH }}

      - name: Upload release AAB and checksum
        uses: actions/upload-artifact@v7
        with:
          name: release-aab-${{ github.ref_name }}
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/bundle/release/checksums-sha256.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "CoreGuard ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/bundle/release/checksums-sha256.txt
          body: |
            ## Verification

            **Package name:** `com.coldboar.coreguard`

            Verify the SHA-256 checksum published in `checksums-sha256.txt` against the downloaded AAB
            before installing. A GitHub artifact attestation is available for this build — run:

            ```
            gh attestation verify <AAB file> --repo ${{ github.repository }}
            ```

            This release was built from tag `${{ github.ref_name }}` by the CI pipeline. See the
            [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            for full build logs and provenance details.

            See [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md)
            for the official distribution and signing-key custody policy.
