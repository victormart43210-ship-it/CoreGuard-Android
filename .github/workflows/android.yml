name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-gate:
    name: Security gate (secrets + policy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail on committed secrets / keystores
        run: |
          set -euo pipefail
          # Block common secret material from entering the tree.
          BLOCKED_GLOBS=(
            '*.jks'
            '*.keystore'
            '*service-account*.json'
            '*google-services*.json'
            '.env'
            '.env.*'
          )
          FOUND=0
          for pattern in "${BLOCKED_GLOBS[@]}"; do
            matches=$(git ls-files "$pattern" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Blocked secret-like path committed: $matches"
              FOUND=1
            fi
          done
          # Content scan for high-risk patterns (prototype enforcement).
          if git grep -nE \
            'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AIza[0-9A-Za-z_-]{20,}|sk_live_[0-9A-Za-z]+|KEYSTORE_PASSWORD\s*=\s*["'\''][^"'\'']+["'\'']' \
            -- \
            ':!docs/**' \
            ':!*.md' \
            ':!.github/workflows/**' \
            ':!AGENTS.md' \
            2>/dev/null; then
            echo "::error::Possible secret material found in tracked source"
            FOUND=1
          fi
          # Honesty: no fake Play approval / billing-verified claims in release copy.
          if git grep -nEi \
            'play store (approved|certified)|billing verified without server|guaranteed approval' \
            -- 'docs/**' 'README.md' 2>/dev/null; then
            echo "::error::Found overstated Play/billing claims in docs"
            FOUND=1
          fi
          if [ "$FOUND" -ne 0 ]; then
            exit 1
          fi
          echo "Secret / honesty gate passed."

  build:
    name: Build + test + lint
    runs-on: ubuntu-latest
    needs: security-gate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (app + billing-server)
        run: ./gradlew test --stacktrace

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
