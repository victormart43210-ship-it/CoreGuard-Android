name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  cli:
    name: Go CLI (race + vet)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build -o /tmp/coreguard-cli ./cmd/coreguard

  build:
    name: Android test + assemble
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Assemble release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Bundle release AAB (unsigned)
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB (unsigned)
        uses: actions/upload-artifact@v7
        with:
          name: release-aab-unsigned
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
